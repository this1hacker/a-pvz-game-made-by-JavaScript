<!DOCTYPE html>
<html lang="zh-CN">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>pvz</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            background-color: #222;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            overflow: hidden;
        }

        #container {
            width: 900px;
            height: 720px;
            /* 【修改】高度从 600px 增加到 720px，向下扩大 120px */
            overflow: hidden;
            position: relative;
            background-color: #4a8c3a;
            box-shadow: 0 0 20px rgba(0, 0, 0, 0.5);
        }

        #bg {
            margin-left: -150px;
            margin-top: 120px;
            /* 保持原样，确保背景与卡片对齐 */
            position: absolute;
            top: 0;
            left: 0;
            /* 如果背景图高度不够，可能需要设置 background-size 或更换大图 */
        }

        .card {
            position: absolute;
            top: 0px;
            left: 0px;
            cursor: pointer;
            z-index: 20;
        }

        /* 【新增】掉落的阳光样式 */
        .falling-sun {
            position: absolute;
            width: 60px;
            height: 60px;
            cursor: pointer;
            z-index: 100;
            /* 确保阳光在最上层 */
            transition: top 3s linear, left 3s linear;
            /* 下落动画 */
        }

        /* 阳光收集时的飞向动画类 */
        .sun-collecting {
            transition: all 0.5s ease-in !important;
            opacity: 0;
        }
         /* 【新增】卡牌价格显示样式 */
        .card-price-tag {
            position: absolute;
            color: #000; /* 纯黑色 */
            font-size: 20px;
            font-weight: bold;
            pointer-events: none;
            z-index: 25;
            /* 移除所有布局属性，由 JS 控制 */
        }
    </style>
</head>

<body ondragstart="return false;">
    <div id="container">
        <img id="bg" src="images/Background.jpg">

        <!-- 【新增】铲子图标 -->
        <img id="shovel" src="images/Shovel.png" 
             style="position: absolute; top: 130px; right: 10px; z-index: 30; cursor: pointer;"
             onclick="toggleShovel()" 
             title="点击激活/取消铲子">

        <!-- 植物卡片 -->
        <img class="card" onclick="dragPlant(1)" src="plantcard/SunFlower.png">
        <img class="card" onclick="dragPlant(2)" style="left: 100px;" src="plantcard/PeaShooter.png">
        <img class="card" onclick="dragPlant(3)" style="left: 200px;" src="plantcard/SnowPea.png">
        <img class="card" onclick="dragPlant(4)" style="left: 300px;" src="plantcard/Repeater.png">
        <img class="card" onclick="dragPlant(5)" style="left: 400px;" src="plantcard/CherryBomb.png">
        <img class="card" onclick="dragPlant(6)" style="left: 500px;" src="plantcard/Chomper.png">
        <img class="card" onclick="dragPlant(7)" style="left: 600px;" src="plantcard/WallNut.png">
        <img class="card" onclick="dragPlant(8)" style="left: 700px;" src="plantcard/Garlic.png">
        <img class="card" onclick="dragPlant(9)" style="left: 800px;" src="plantcard/Torchwood.png">
        <img class="card" onclick="dragPlant(10)" style="top: 60px;" src="plantcard/Spikeweed.png">
        <img class="card" onclick="dragPlant(11)" style="top: 60px; left: 100px;" src="plantcard/TwinSunflower.png">
        <img class="card" onclick="dragPlant(12)" style="top: 60px; left: 200px;" src="plantcard/PotatoMine.bmp">
        <img class="card" onclick="dragPlant(13)" style="top: 60px; left: 300px;" src="plantcard/Squash.png">
    </div>

    <!-- 【新增】阳光显示区域，位于地刺正下方 -->
    <!-- 使用 fixed 定位确保它始终在屏幕指定位置，不受 container 滚动影响 -->
    <!-- 假设屏幕居中，container 宽 900，高 720。地刺在 left:800, top:60。 -->
    <!-- 这里我们简单地将它放在 body 下，通过 calc 计算居中后的偏移 -->
    <div style="position: fixed; top: calc(50% - 240px); left: calc(50% - 450px); z-index: 50; pointer-events: none;">
        <!-- SunBack 图片，不固定宽高，自适应原始尺寸 -->
        <img src="images/SunBack.png" style="display: block;">
        <!-- 阳光数值，绝对定位居中 -->
        <span id="sun-value-text"
            style="position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); color: black; font-size: 20px; font-weight: bold; font-family: Arial, sans-serif;">50</span>
    </div>
    
    <script src="sprites.js"></script>
    <script>
        // --- 【全局游戏配置】 ---
        // 【删除】 var MAX_ZOMBIES = 60; 

        var gameStartTime = 0; 
        var zombies = [];
        var zbIndex = 0; // 这个可以保留，用于统计总共生成了多少只，或者作为ID
        var plants = [];
        var bullets = [];
        var zbDieNo = 0;

        // 【新增】标记是否所有僵尸已生成完毕
        var isSpawnFinished = false; 

        // 记录上一只僵尸生成的时间，用于控制间隔
        var lastZombieSpawnTime = 0; 

        // 【新增】全局植物价格表
        var PLANT_PRICES = {
            1: 50,   // SunFlower
            2: 100,  // PeaShooter
            3: 175,  // SnowPea
            4: 200,  // Repeater
            5: 150,  // CherryBomb
            6: 150,  // Chomper
            7: 50,   // WallNut
            8: 50,   // Garlic
            9: 175,  // Torchwood
            10: 100, // Spikeweed
            11: 125, // TwinSunflower
            12: 25,  // PotatoMine
            13: 50   // Squash
        };

        // 【新增】铲子状态变量
        var isShovelActive = false;

        // 【新增】切换铲子状态函数
        function toggleShovel() {
            isShovelActive = !isShovelActive;
            var shovel = document.getElementById('shovel');
            
            if (isShovelActive) {
                // 激活状态
                shovel.style.opacity = "0.8";
                shovel.style.transform = "scale(1.1)";
                // 激活时，pointerEvents 由 mousemove 控制
            } else {
                // 取消激活：恢复原位
                shovel.style.opacity = "1";
                shovel.style.transform = "scale(1)";
                
                // 【关键修复】恢复铲子到右上角初始位置
                shovel.style.position = 'absolute';
                shovel.style.top = '130px'; // 【修改】从 10px 改为 130px
                shovel.style.right = '10px';
                shovel.style.left = 'auto'; // 清除跟随时的 left
                shovel.style.zIndex = '30'; // 恢复层级
                shovel.style.pointerEvents = 'auto'; // 恢复可点击
            }
        }

        // 【新增】阳光系统变量
        var sunValue = 50;
        var sunDisplay = null; // 初始化为 null
        var container = document.getElementById('container');

        // 【新增】更新阳光显示函数
        function updateSunDisplay() {
            if (sunDisplay) {
                sunDisplay.innerText = sunValue;
            }
        }

        // 【新增】创建掉落阳光的函数
        function createFallingSun() {
            var sun = document.createElement("img");
            sun.src = "images/Sun.gif";
            sun.className = "falling-sun";

            // 随机水平位置 (容器宽 900，减去阳光宽 60)
            var randomLeft = Math.floor(Math.random() * (900 - 60));
            sun.style.left = randomLeft + "px";
            sun.style.top = "-60px";

            container.appendChild(sun);

            // 触发下落动画
            setTimeout(function () {
                var randomTop = Math.floor(Math.random() * (500 - 150) + 150); // 落在草坪区域
                sun.style.top = randomTop + "px";
            }, 50);

            // 点击事件：收集阳光
            sun.onclick = function (e) {
                e.stopPropagation(); // 防止事件冒泡
                sunValue += 25;
                updateSunDisplay();

                // 【修复】计算飞向新目标的坐标
                // 新目标位置: top: calc(50% - 240px); left: calc(50% - 450px);

                var halfWidth = window.innerWidth / 2;
                var halfHeight = window.innerHeight / 2;

                // 目标相对于视口 (Viewport) 的坐标
                // 对应 CSS: left: calc(50% - 450px)
                var targetViewportLeft = halfWidth - 450 + 10; // +10 微调居中

                // 对应 CSS: top: calc(50% - 240px)
                var targetViewportTop = halfHeight - 240 + 10; // +10 微调居中

                // 获取 container 相对于视口的位置
                var containerRect = container.getBoundingClientRect();

                // 计算目标相对于 container 的坐标
                var finalLeft = targetViewportLeft - containerRect.left;
                var finalTop = targetViewportTop - containerRect.top;

                sun.classList.add('sun-collecting');
                sun.style.left = finalLeft + "px";
                sun.style.top = finalTop + "px";

                // 动画结束后移除元素
                setTimeout(function () {
                    if (sun.parentNode) {
                        sun.parentNode.removeChild(sun);
                    }
                }, 500);
            };

            // 如果 8 秒内没被点击，自动消失
            setTimeout(function () {
                if (sun.parentNode && !sun.classList.contains('sun-collecting')) {
                    sun.style.opacity = "0";
                    sun.style.transition = "opacity 0.5s";
                    setTimeout(function () {
                        if (sun.parentNode) sun.parentNode.removeChild(sun);
                    }, 500);
                }
            }, 8000);
        }

        // 【新增】启动自然阳光掉落定时器
        function startNaturalSun() {
            setInterval(createFallingSun, 10000);
            setTimeout(createFallingSun, 2000);
        }
        function shoot(plant) {  //定义一个shoot函数，用于处理植物的射击事件，参数plant表示射击的植物精灵
            for (var zombie of zombies) { //遍历zombies数组中的每个僵尸精灵
                if (zombie.offsetLeft > plant.offsetLeft - 70 && //判断僵尸是否在植物的射程范围内
                    zombie.route == plant.route) { //判断僵尸是否与植物在同一行

                    // 发射第一颗子弹
                    bullets.push(creatdBullet(plant, bullet => {
                        bullets = bullets.filter(item => item != bullet);
                        container.removeChild(bullet);
                    }));

                    // 如果是双发射手 (type 4)，发射第二颗子弹
                    if (plant.type == 4) {
                        // 使用 setTimeout 稍微延迟发射第二颗子弹，产生连发效果
                        setTimeout(() => {
                            // 检查植物是否还存在，防止植物在延迟期间被吃掉导致报错
                            if (plant.parentNode) {
                                bullets.push(creatdBullet(plant, bullet => {
                                    bullets = bullets.filter(item => item != bullet);
                                    container.removeChild(bullet);
                                }));
                            }
                        }, 150); // 延迟150毫秒发射第二颗
                    }

                    break;
                }
            }
        }

         // 【修改】dragPlant 函数，移除阳光扣除，改为在放置成功时扣除
        function dragPlant(type) {  
            // 1. 如果铲子处于激活状态，禁止种植
            if (isShovelActive) {
                return; 
            }

            // 2. 直接创建植物预览，阳光扣除逻辑移至 createPlant 内部的成功放置分支
            createPlant(type, plant => {
                
                // 【新增】如果是土豆地雷，在放置成功后开始倒计时
                if (type == 12) {
                    setTimeout(function() {
                        // 再次检查植物是否还存在，防止被铲子铲除后仍变图
                        if (plant.parentNode) {
                            plant.src = "images/PotatoMine.gif";
                            plant.isReady = true;
                        }
                    }, 20000); // 【修改】这里从 3000 改为 20000，即 20 秒
                } else {
                    // 其他植物的射击逻辑
                    shoot(plant); 
                    plant.timer = setInterval(() => { 
                        shoot(plant);
                    }, 1800);
                }
                
                plants.push(plant);
            }); 
        }
        // 监听网页是否退到后台
        document.onvisibilitychange = function () {
            isBack = document.visibilityState != 'visible';
        }
        window.onload = function () {
            // 【新增】初始化卡牌价格显示
            initCardPrices();

            // 【新增】确保在 DOM 加载完成后获取阳光显示元素
            sunDisplay = document.getElementById('sun-value-text');
            
            updateSunDisplay(); // 初始化显示
            startNaturalSun();  // 【新增】启动自然阳光
            
            // 【新增】初始化铲子交互逻辑 (调用 sprites.js 中的函数)
            if (typeof initShovelInteraction === 'function') {
                initShovelInteraction();
            }

            setInterval(() => {
                if (!window.isBack) {
                    addSprite(); 
                    spriteStep(); 
                    onHitting(); 
                }

            }, 100 / 8)
        }
       // 【新增】初始化卡牌价格函数
        function initCardPrices() {
            var cards = document.querySelectorAll('.card');
            cards.forEach(function(cardImg) {
                var onclickAttr = cardImg.getAttribute('onclick');
                if (onclickAttr) {
                    var match = onclickAttr.match(/dragPlant\((\d+)\)/);
                    if (match) {
                        var type = parseInt(match[1]);
                        var price = PLANT_PRICES[type]; // 使用全局价格表
                        
                        if (price !== undefined) {
                            var priceSpan = document.createElement('span');
                            priceSpan.className = 'card-price-tag';
                            priceSpan.innerText = price;
                            
                            // 计算位置逻辑保持不变
                            var cardTop = parseInt(cardImg.style.top || 0);
                            var cardLeft = parseInt(cardImg.style.left || 0);
                            var CARD_WIDTH = 60;
                            var CARD_HEIGHT = 120;
                            
                            var cardRightEdge = cardLeft + CARD_WIDTH;
                            var cardBottomEdge = cardTop + CARD_HEIGHT;
                            
                            // 这里的参数是你之前调好的：往上85，往右0（即右下角）
                            var finalTop = cardBottomEdge - 85;
                            var finalLeft = cardRightEdge; 
                            
                            priceSpan.style.top = finalTop + "px";
                            priceSpan.style.left = finalLeft + "px";
                            
                            container.appendChild(priceSpan);
                        }
                    }
                }
            });
        }
        function addSprite() {  
            // 【修改】如果已经标记为生成完毕，直接返回，不再生成
            if (isSpawnFinished) { 
                return;
            }

            var now = Date.now();
            
            // 1. 初始化开始时间
            if (gameStartTime === 0) {
                gameStartTime = now;
                lastZombieSpawnTime = now;
                return;
            }

            var elapsedTime = now - gameStartTime; 
            var timeSinceLastSpawn = now - lastZombieSpawnTime; 

            // --- 【阶段配置】 ---
            var currentStage = "";
            var spawnInterval = 0; 
            var spawnCount = 1;    
            var zombieTypes = [];  

            // 定义最终阶段结束的时间点 (例如 300秒 = 300000毫秒)
            // 当时间超过这个值，我们就认为“生成完了”
            var FINAL_STAGE_END_TIME = 300000; 

            // 阶段 1: 0-30s
            if (elapsedTime < 30000) {
                currentStage = "Stage 1";
                spawnInterval = 10000; 
                spawnCount = 1;
                zombieTypes = [1, 0, 0]; 
            }
            // 阶段 2: 30s-60s
            else if (elapsedTime < 60000) {
                currentStage = "Stage 2";
                spawnInterval = 8000; 
                spawnCount = 2;       
                zombieTypes = [1, 0, 0]; 
            }
            // 阶段 3: 60s-180s
            else if (elapsedTime < 180000) {
                currentStage = "Stage 3";
                spawnInterval = 4500; 
                spawnCount = 2;
                zombieTypes = [5, 5, 0]; 
            }
            // 阶段 4: 180s-300s
            else if (elapsedTime < 300000) {
                currentStage = "Stage 4";
                spawnInterval = 3500; 
                spawnCount = 2;
                zombieTypes = [4, 3.5, 2.5]; 
            }
            // 【修改】阶段 5: 300s+ 
            // 原逻辑是无限生成，现在我们需要在这个阶段运行一段时间后停止
            else {
                // 这里我们可以选择：
                // 方案 A: 300s 后立即停止生成 (最安全，确保有终点)
                // 方案 B: 300s-360s 继续高强度生成，然后停止
                
                // 这里采用方案 B：最后再冲刺 60 秒
                if (elapsedTime < 360000) { 
                    currentStage = "Stage 5: FINAL RUSH";
                    spawnInterval = 1200; 
                    spawnCount = 1; 
                    zombieTypes = [1, 4, 5]; 
                } else {
                    // 时间超过 360秒，标记生成完毕
                    isSpawnFinished = true;
                    console.log("所有僵尸已生成完毕，等待清理战场...");
                    return; // 本次调用不再生成
                }
            }

            // --- 【执行生成逻辑】 ---
            if (timeSinceLastSpawn >= spawnInterval) {
                
                // 注意：这里不再需要检查 zbIndex >= MAX_ZOMBIES
                
                for (var k = 0; k < spawnCount; k++) {
                    // 根据权重随机选择僵尸类型
                    var sumWeights = zombieTypes[0] + zombieTypes[1] + zombieTypes[2];
                    var randomVal = Math.random() * sumWeights;
                    var status = 0; 
                    
                    if (randomVal < zombieTypes[0]) {
                        status = parseInt(Math.random() * 3); // 普通
                    } else if (randomVal < zombieTypes[0] + zombieTypes[1]) {
                        status = 3 + parseInt(Math.random() * 2); // 路障
                    } else {
                        status = 5; // 铁桶
                    }

                    // 创建僵尸
                    var newZombie = createZombie(zbIndex, () => {
                        alert("Game Over!"); 
                        location.reload(); 
                    }, status);

                    zombies.push(newZombie);
                    zbIndex++; // 仍然递增，用于唯一标识或统计总数
                }

                // 重置上次生成时间
                lastZombieSpawnTime = now;
            }
        }
        function spriteStep() {  
            for (var zombie of zombies) { 
                // --- 【核心修复】处理冰冻状态恢复逻辑 ---
                if (zombie.isFrozen) {
                    if (zombie.freezeTimer > 0) {
                        zombie.freezeTimer--; // 每帧递减
                    } else {
                        // 计时结束，恢复正常
                        zombie.isFrozen = false;
                        zombie.speed = zombie.baseSpeed; // 恢复到基础速度 (6)
                        zombie.style.filter = "none";    // 移除蓝色滤镜
                    }
                }
                // ----------------------------------

                zombie.step(); // 调用每个僵尸精灵的step方法，更新其位置和状态
            }
            
            for (var bullet of bullets) { 
                bullet.step(); 
            }
        }
        // 在 04-pvz.html 的 <script> 标签内，替换原有的 onHitting 函数
        // 04-pvz.html <script>

        function onHitting() {
            // 1.先处理所有子弹的飞行和碰撞检测
            for (var i = bullets.length - 1; i >= 0; i--) {
                var bullet = bullets[i];
                if (bullet.src.endsWith("BulletHit.gif")) {
                    continue;
                }

                if (hitZombie(bullet)) {
                    bullet.src = "images/BulletHit.gif";
                }
            }

            // 2. 【终极修复】土豆地雷爆炸逻辑 - 分离特效与本体
            for (var pIndex = plants.length - 1; pIndex >= 0; pIndex--) {
                var plant = plants[pIndex];
                
                if (plant.type == 12 && plant.isReady) {
                    var exploded = false;
                    
                    // 遍历所有僵尸，检测是否在爆炸范围内
                    for (var z of zombies) {
                        if (z.blood <= 0 || z.src.includes("Die") || z.src.includes("LostHead")) {
                            continue;
                        }

                        // 判定位置：以植物左边缘为基准
                        var plantCenterX = plant.offsetLeft; 
                        var zombieCenterX = z.offsetLeft + 40; 
                        var distance = Math.abs(plantCenterX - zombieCenterX);
                        
                        // 触发距离：30px
                        if (plant.route == z.route && distance < 30) {
                            
                            // --- 第一步：立即清理原植物（释放格子、移除DOM、移除数组）---
                            
                            // 1. 释放网格状态
                            if (plant.route !== undefined && plant.col !== undefined) {
                                window.gridState[plant.route][plant.col] = null;
                            }
                            
                            // 2. 记录位置用于生成特效
                            var effectLeft = plant.style.left;
                            var effectTop = plant.style.top;
                            
                            // 3. 从数组移除
                            plants.splice(pIndex, 1);
                            
                            // 4. 从 DOM 立即移除原植物
                            if (plant.parentNode) {
                                plant.parentNode.removeChild(plant);
                            }
                            
                            // --- 第二步：创建独立的爆炸特效图片 ---
                            var explosionEffect = document.createElement("img");
                            explosionEffect.src = "images/PotatoMine_mashed.gif";
                            explosionEffect.style.position = "absolute";
                            explosionEffect.style.left = effectLeft;
                            explosionEffect.style.top = effectTop;
                            explosionEffect.style.zIndex = "5"; // 低层级
                            explosionEffect.style.pointerEvents = "none"; // 不阻挡鼠标
                            container.appendChild(explosionEffect);
                            
                            // 5. 设置特效自动销毁定时器
                            setTimeout(function() {
                                if (explosionEffect.parentNode) {
                                    explosionEffect.parentNode.removeChild(explosionEffect);
                                }
                            }, 500); // 0.5秒后销毁特效图

                            // --- 第三步：对范围内僵尸造成伤害 ---
                            for (var targetZ of zombies) {
                                if (targetZ.blood <= 0 || targetZ.src.includes("Die") || targetZ.src.includes("LostHead")) {
                                    continue;
                                }

                                if (targetZ.route == plant.route) {
                                    var distToExplosion = Math.abs(plantCenterX - (targetZ.offsetLeft + 40));
                                    
                                    // 伤害范围：40px
                                    if (distToExplosion < 40) { 
                                        targetZ.blood -= 100;
                                        
                                        if (targetZ.blood <= 0) {
                                            var head = creatdHead(targetZ);
                                            
                                            if (targetZ.src.includes("Attack")) {
                                                targetZ.src = "images/ZombieLostHeadAttack.gif";
                                            } else {
                                                targetZ.src = "images/ZombieLostHead.gif";
                                            }
                                            
                                            (function(z, h) {
                                                setTimeout(() => {
                                                    if(z.parentNode) {
                                                        z.src = "images/ZombieDie.gif";
                                                        if(h.parentNode) container.removeChild(h);
                                                    }
                                                }, 1000);
                                                
                                                setTimeout(() => {
                                                    zombieDie(z);
                                                }, 2000);
                                            })(targetZ, head);
                                        } else {
                                            targetZ.style.opacity = 0.5;
                                            setTimeout(() => { if(targetZ.parentNode) targetZ.style.opacity = 1; }, 100);
                                        }
                                    }
                                }
                            }

                            exploded = true;
                            break; 
                        }
                    }
                    
                    if (exploded) break; 
                }
            }

            // 3. 再处理普通僵尸吃植物的逻辑 (原有的 eatPlantBy 逻辑)
            for (var j = zombies.length - 1; j >= 0; j--) {
                var zombie = zombies[j];

                if (zombie.src.includes("Die") || zombie.src.includes("LostHead")) {
                    continue;
                }

                var plant = eatPlantBy(zombie);

                if (plant) {
                    // 【重要修复】处理土豆地雷的逻辑
                    if (plant.type == 12) {
                        if (!plant.isReady) {
                            // --- 情况 A: 未就绪 -> 允许被吃 ---
                            
                            // 1. 让僵尸显示“正在吃”的图片
                            if (zombie.blood <= 10) {
                                if (!zombie.src.includes("Attack")) zombie.src = "images/ZombieAttack.gif";
                            } else if (zombie.status == 5) {
                                if (!zombie.src.includes("Attack")) zombie.src = "images/BucketheadZombieAttack.gif";
                            } else {
                                if (!zombie.src.includes("Attack")) zombie.src = "images/ConeheadZombieAttack.gif";
                            }

                            // 2. 将僵尸加入植物的攻击列表（防止多个僵尸同时吃导致逻辑混乱，虽然通常只有一个）
                            if (!plant.attack.includes(zombie)) {
                                plant.attack.push(zombie);
                            }

                            // 3. 扣血
                            plant.blood--;

                            // 4. 检查是否被吃完
                            if (plant.blood <= 0) {
                                // 被吃完了，正常移除，不爆炸
                                if (plant.timer) clearInterval(plant.timer);
                                
                                var pIndex = plants.indexOf(plant);
                                if (pIndex > -1) {
                                    plants.splice(pIndex, 1);
                                }
                                
                                if (plant.route !== undefined && plant.col !== undefined) {
                                    window.gridState[plant.route][plant.col] = null;
                                }

                                container.removeChild(plant);

                                // 僵尸恢复行走
                                for (var zz of plant.attack) {
                                    if (zz && zz.blood > 0) {
                                        if (zz.blood <= 10) {
                                            zz.src = "images/Zombie.gif";
                                        } else if (zz.status == 5) {
                                            zz.src = "images/BucketheadZombie.gif";
                                        } else if (zz.status == 3 || zz.status == 4) {
                                            zz.src = "images/ConeheadZombie.gif";
                                        }
                                        
                                        if (!zz.isFrozen) {
                                            zz.speed = zz.baseSpeed;
                                            zz.style.filter = "none";
                                        }
                                    }
                                }
                            }
                            
                            // 注意：这里直接 continue 跳过后续通用的扣血逻辑，因为上面已经处理完了
                            continue; 

                        } else {
                            // --- 情况 B: 已就绪 -> 理论上应该触发爆炸 ---
                            // 如果代码执行到这里，说明僵尸贴脸了但没触发上面的爆炸检测（可能是距离判定极小误差）
                            // 为了保险，我们强制触发一次爆炸逻辑，或者视为被吃掉。
                            // 这里选择视为被吃掉（虽然不合理，但防止卡死），或者你可以选择在这里手动调用爆炸逻辑。
                            // 鉴于上面的爆炸检测范围是 <30，而 eatPlantBy 的范围更宽，这里可能存在空隙。
                            // 最稳妥的方式：如果已就绪却被吃，强制引爆。
                            
                            // 由于引爆逻辑比较复杂且涉及数组操作，简单起见，我们让它像普通植物一样被扣血直至死亡（不爆炸）
                            // 或者，你可以取消下面的注释来强制引爆（需要重构代码，较复杂）。
                            // 目前保持原样：已就绪的土豆雷如果被“吃”（即错过了爆炸判定），则被摧毁而不爆炸。
                        }
                    }

                    // --- 通用植物被吃逻辑 (非土豆雷，或土豆雷已就绪但未爆炸的情况) ---
                    if (plant.blood > 0) {
                        // --- 僵尸攻击图片逻辑 ---
                        if (plant.type != 12) { // 土豆雷不需要显示被吃的动画（除非未就绪，上面已处理）
                            if (zombie.blood <= 10) {
                                if (!zombie.src.includes("Attack")) zombie.src = "images/ZombieAttack.gif";
                            } else if (zombie.status == 5) {
                                if (!zombie.src.includes("Attack")) zombie.src = "images/BucketheadZombieAttack.gif";
                            } else {
                                if (!zombie.src.includes("Attack")) zombie.src = "images/ConeheadZombieAttack.gif";
                            }
                        }

                        if (!plant.attack.includes(zombie)) {
                            plant.attack.push(zombie);
                        }

                        // 扣植物血
                        plant.blood--;

                        // --- 坚果墙受伤变图逻辑 ---
                        if (plant.type == 7) {
                            var currentStage = plant.damageStage;
                            var newStage = 0;
                            var targetImg = "images/WallNut.gif";

                            if (plant.blood < 1000) {
                                newStage = 2;
                                targetImg = "images/WallNut_cracked2.gif";
                            } else if (plant.blood < 2000) {
                                newStage = 1;
                                targetImg = "images/WallNut_cracked1.gif";
                            } else {
                                newStage = 0;
                                targetImg = "images/WallNut.gif";
                            }

                            if (currentStage !== newStage) {
                                plant.src = targetImg;
                                plant.damageStage = newStage;
                            }
                        }
                        // ----------------------------------

                        // 检查植物是否死亡
                        if (plant.blood <= 0) {
                            // 【新增】清除向日葵的产阳光定时器
                            if (plant.sunTimer) {
                                clearInterval(plant.sunTimer);
                            }

                            if (plant.timer) clearInterval(plant.timer); // 原有的射击定时器

                            var pIndex = plants.indexOf(plant);
                            if (pIndex > -1) {
                                plants.splice(pIndex, 1);
                            }
                            
                            // 【核心修复】在移除 DOM 前，先清除网格占用状态
                            // 确保其他植物可以种在这个位置
                            if (plant.route !== undefined && plant.col !== undefined) {
                                window.gridState[plant.route][plant.col] = null;
                            }

                            container.removeChild(plant);

                            // 【重要修复】植物死亡后，僵尸恢复行走状态
                            for (var zz of plant.attack) {
                                if (zz && zz.blood > 0) {
                                    // 恢复僵尸图片
                                    if (zz.blood <= 10) {
                                        zz.src = "images/Zombie.gif";
                                    } else if (zz.status == 5) {
                                        zz.src = "images/BucketheadZombie.gif";
                                    } else if (zz.status == 3 || zz.status == 4) {
                                        zz.src = "images/ConeheadZombie.gif";
                                    }
                                    
                                    // 【新增】如果僵尸当前没有被冰冻，才恢复基础速度
                                    if (!zz.isFrozen) {
                                        zz.speed = zz.baseSpeed; // 恢复为基础速度 6
                                        zz.style.filter = "none";
                                    }
                                }
                            }
                        }
                    }
                }
            }
        }
        function eatPlantBy(zombie) {
            for (var i in plants) {
                var plant = plants[i];
                if (plant.offsetLeft - 40 > zombie.offsetLeft &&
                    plant.offsetLeft - 100 < zombie.offsetLeft &&
                    plant.route == zombie.route) { //判断僵尸是否在植物的范围内，并且与植物在同一行
                    plant.index = i; // 记录所在下标
                    return plant;
                }
            }
            return null; //返回null，表示没有找到被僵尸吃掉的植物
        }

        // 在 04-pvz.html 的 <script> 标签内，替换原有的 hitZombie 函数

        // 04-pvz.html <script>

        function hitZombie(bullet) {
            for (var zombie of zombies) {
                // 忽略已经死亡或正在死亡的僵尸
                if (zombie.src.includes("Die") || zombie.src.includes("LostHead")) {
                    continue;
                }

                // 碰撞检测
                if (bullet.offsetLeft - 70 > zombie.offsetLeft &&
                    bullet.offsetLeft - 140 < zombie.offsetLeft &&
                    bullet.route == zombie.route) {
                    
                    // 击中僵尸，扣血
                    zombie.blood--;
                    
                    // --- 【修改】处理掉帽子/路障逻辑 ---
                    if (zombie.blood <= 10 && zombie.status != 0 && zombie.status != 1 && zombie.status != 2) {
                        zombie.status = 0; 
                        var isAttacking = zombie.src.includes("Attack");
                        zombie.src = isAttacking ? "images/ZombieAttack.gif" : "images/Zombie.gif";
                    }
                    // ----------------------------------

                    // --- 【修复】处理冰冻豌豆效果 ---
                    if (bullet.type == 3 && zombie.blood > 0) {
                        // 1. 设置冰冻标记
                        zombie.isFrozen = true;
                        
                        // 2. 重置冰冻计时器 
                        // 游戏循环约 80fps (100/8 ms)。3秒 = 3000ms。
                        // 3000 / 12.5 = 240 帧。为了保险，设为 250。
                        zombie.freezeTimer = 250; 
                        
                        // 3. 立即应用减速视觉效果
                        // speed 从 6 变为 12，意味着移动频率减半，实现减速
                        zombie.speed = 12; 
                        zombie.style.filter = "brightness(0.6) hue-rotate(180deg) saturate(1.5)";
                    }
                    // ----------------------------------

                    // 处理僵尸死亡
                    if (zombie.blood <= 0) {
                        var head = creatdHead(zombie);
                        if (zombie.src.includes("Attack")) {
                            zombie.src = "images/ZombieLostHeadAttack.gif";
                        } else {
                            zombie.src = "images/ZombieLostHead.gif";
                        }
                        
                        setTimeout(() => {
                            if(zombie.parentNode) {
                                zombie.src = "images/ZombieDie.gif";
                                if(head.parentNode) container.removeChild(head);
                            }
                        }, 1000);
                        
                        setTimeout(() => {
                            zombieDie(zombie);
                        }, 2000);
                        
                        return true; 
                    } 
                    else {
                        // 僵尸未死，显示受伤闪烁效果
                        zombie.style.opacity = 0.7;
                        setTimeout(() => {
                            if(zombie.parentNode) zombie.style.opacity = 1;
                        }, 100);
                    }
                    
                    return true; 
                }
            }
            return false;
        }

        function zombieDie(zombie) {
            zombies = zombies.filter(item => item != zombie); 
            container.removeChild(zombie); 
            zbDieNo++; 
            
            // 【核心修改】获胜条件：
            // 1. isSpawnFinished 为 true (所有计划内的僵尸都已生成)
            // 2. zombies.length === 0 (场上没有存活的僵尸)
            if (isSpawnFinished && zombies.length === 0) {
                // 防止重复弹窗，可以加一个锁，或者依靠 location.reload 刷新页面
                setTimeout(function() {
                    alert("You Win! 恭喜通关！所有僵尸已被消灭。"); 
                    location.reload(); 
                }, 500);
            }
        }

    </script>
