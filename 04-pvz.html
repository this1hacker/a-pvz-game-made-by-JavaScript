<!DOCTYPE html>
<html lang="zh-CN">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>pvz</title>
        <style>
        body {
            margin: 0;
            padding: 0;
            background-color: #222;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            overflow: hidden;
        }

        #container {
            width: 900px;
            height: 720px; /* 【修改】高度从 600px 增加到 720px，向下扩大 120px */
            overflow: hidden;
            position: relative;
            background-color: #4a8c3a;
            box-shadow: 0 0 20px rgba(0,0,0,0.5);
        }

        #bg {
            margin-left: -150px;
            margin-top: 120px; /* 保持原样，确保背景与卡片对齐 */
            position: absolute;
            top: 0;
            left: 0;
            /* 如果背景图高度不够，可能需要设置 background-size 或更换大图 */
        }

        .card {
            position: absolute;
            top: 0px;
            left: 0px;
            cursor: pointer;
            z-index: 20;
        }

        /* 【新增】掉落的阳光样式 */
        .falling-sun {
            position: absolute;
            width: 60px;
            height: 60px;
            cursor: pointer;
            z-index: 100; /* 确保阳光在最上层 */
            transition: top 3s linear, left 3s linear; /* 下落动画 */
        }
        
        /* 阳光收集时的飞向动画类 */
        .sun-collecting {
            transition: all 0.5s ease-in !important;
            opacity: 0;
        }
    </style>
</head>

<body ondragstart="return false;">
    <div id="container">
        <img id="bg" src="images/Background.jpg">
        
        <!-- 植物卡片 -->
        <img class="card" onclick="dragPlant(1)" src="plantcard/SunFlower.png">
        <img class="card" onclick="dragPlant(2)" style="left: 100px;" src="plantcard/PeaShooter.png">
        <img class="card" onclick="dragPlant(3)" style="left: 200px;" src="plantcard/SnowPea.png">
        <img class="card" onclick="dragPlant(4)" style="left: 300px;" src="plantcard/Repeater.png">
        <img class="card" onclick="dragPlant(5)" style="left: 400px;" src="plantcard/CherryBomb.png">
        <img class="card" onclick="dragPlant(6)" style="left: 500px;" src="plantcard/Chomper.png">
        <img class="card" onclick="dragPlant(7)" style="left: 600px;" src="plantcard/WallNut.png">
        <img class="card" onclick="dragPlant(8)" style="left: 700px;" src="plantcard/Garlic.png">
        <img class="card" onclick="dragPlant(9)" style="left: 800px;" src="plantcard/Torchwood.png">
        <img class="card" onclick="dragPlant(10)" style="top: 60px;" src="plantcard/Spikeweed.png">
        <img class="card" onclick="dragPlant(11)" style="top: 60px; left: 100px;" src="plantcard/TwinSunflower.png">
        <img class="card" onclick="dragPlant(12)" style="top: 60px; left: 200px;" src="plantcard/SunFlowerG.png">
        <img class="card" onclick="dragPlant(13)" style="top: 60px; left: 300px;" src="plantcard/Squash.png">
    </div>

    <!-- 【新增】阳光显示区域，位于地刺正下方 -->
    <!-- 使用 fixed 定位确保它始终在屏幕指定位置，不受 container 滚动影响 -->
    <!-- 假设屏幕居中，container 宽 900，高 720。地刺在 left:800, top:60。 -->
    <!-- 这里我们简单地将它放在 body 下，通过 calc 计算居中后的偏移 -->
    <div style="position: fixed; top: calc(50% - 240px); left: calc(50% - 450px); z-index: 50; pointer-events: none;">
        <!-- SunBack 图片，不固定宽高，自适应原始尺寸 -->
        <img src="images/SunBack.png" style="display: block;">
        <!-- 阳光数值，绝对定位居中 -->
        <span id="sun-value-text" style="position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); color: black; font-size: 20px; font-weight: bold; font-family: Arial, sans-serif;">50</span>
    </div>

    <script src="sprites.js">
    </script>
    <script src="sprites.js">

    </script>
    <script>
        var counter = 0; 
        var duration = 1000; 
        var zombies = []; 
        var zbIndex = 0; 
        var plants = []; 
        var bullets = []; 
        var zbDieNo = 0; 
        
        // 【新增】阳光系统变量
        var sunValue = 50; 
        var sunDisplay = document.getElementById('sun-value-text');
        var container = document.getElementById('container'); 

        // 【新增】更新阳光显示函数
        function updateSunDisplay() {
            if (sunDisplay) {
                sunDisplay.innerText = sunValue;
            }
        }

        // 【新增】创建掉落阳光的函数
        function createFallingSun() {
            var sun = document.createElement("img");
            sun.src = "images/Sun.gif"; 
            sun.className = "falling-sun";
            
            // 随机水平位置 (容器宽 900，减去阳光宽 60)
            var randomLeft = Math.floor(Math.random() * (900 - 60));
            sun.style.left = randomLeft + "px";
            sun.style.top = "-60px"; 
            
            container.appendChild(sun);

            // 触发下落动画
            setTimeout(function() {
                var randomTop = Math.floor(Math.random() * (500 - 150) + 150); // 落在草坪区域
                sun.style.top = randomTop + "px";
            }, 50);

            // 点击事件：收集阳光
            sun.onclick = function(e) {
                e.stopPropagation(); // 防止事件冒泡
                sunValue += 25; 
                updateSunDisplay();
                
                // 【修复】计算飞向新目标的坐标
                // 新目标位置: top: calc(50% - 240px); left: calc(50% - 450px);
                
                var halfWidth = window.innerWidth / 2;
                var halfHeight = window.innerHeight / 2;
                
                // 目标相对于视口 (Viewport) 的坐标
                // 对应 CSS: left: calc(50% - 450px)
                var targetViewportLeft = halfWidth - 450 + 10; // +10 微调居中
                
                // 对应 CSS: top: calc(50% - 240px)
                var targetViewportTop = halfHeight - 240 + 10; // +10 微调居中
                
                // 获取 container 相对于视口的位置
                var containerRect = container.getBoundingClientRect();
                
                // 计算目标相对于 container 的坐标
                var finalLeft = targetViewportLeft - containerRect.left;
                var finalTop = targetViewportTop - containerRect.top;

                sun.classList.add('sun-collecting');
                sun.style.left = finalLeft + "px";
                sun.style.top = finalTop + "px";

                // 动画结束后移除元素
                setTimeout(function() {
                    if (sun.parentNode) {
                        sun.parentNode.removeChild(sun);
                    }
                }, 500);
            };

            // 如果 8 秒内没被点击，自动消失
            setTimeout(function() {
                if (sun.parentNode && !sun.classList.contains('sun-collecting')) {
                    sun.style.opacity = "0";
                    sun.style.transition = "opacity 0.5s";
                    setTimeout(function() {
                        if (sun.parentNode) sun.parentNode.removeChild(sun);
                    }, 500);
                }
            }, 8000);
        }

        // 【新增】启动自然阳光掉落定时器
        function startNaturalSun() {
            setInterval(createFallingSun, 10000);
            setTimeout(createFallingSun, 2000);
        }
        function shoot(plant) {  //定义一个shoot函数，用于处理植物的射击事件，参数plant表示射击的植物精灵
            for (var zombie of zombies) { //遍历zombies数组中的每个僵尸精灵
                if (zombie.offsetLeft > plant.offsetLeft - 70 && //判断僵尸是否在植物的射程范围内
                    zombie.route == plant.route) { //判断僵尸是否与植物在同一行
                    
                    // 发射第一颗子弹
                    bullets.push(creatdBullet(plant, bullet => {
                        bullets = bullets.filter(item => item != bullet);
                        container.removeChild(bullet);
                    }));

                    // 如果是双发射手 (type 4)，发射第二颗子弹
                    if (plant.type == 4) {
                        // 使用 setTimeout 稍微延迟发射第二颗子弹，产生连发效果
                        setTimeout(() => {
                            // 检查植物是否还存在，防止植物在延迟期间被吃掉导致报错
                            if (plant.parentNode) {
                                bullets.push(creatdBullet(plant, bullet => {
                                    bullets = bullets.filter(item => item != bullet);
                                    container.removeChild(bullet);
                                }));
                            }
                        }, 150); // 延迟150毫秒发射第二颗
                    }
                    
                    break; 
                }
            }
        }

        function dragPlant(type) {  //定义一个dragPlant函数，用于处理植物卡片的拖动事件
            createPlant(type, plant => {
                shoot(plant); //调用shoot函数，传入创建的植物精灵作为参数，处理植物的射击事件
                plant.timer = setInterval(() => { //定义一个定时器，每隔2000毫秒调用一次shoot函数，传入当前植物精灵作为参数，处理植物的射击事件
                    shoot(plant);
                }, 1800) //每隔1800毫秒调用一次shoot函数，处理植物的射击事件
                plants.push(plant);
            }); //调用createPlant函数，创建一个新的植物精灵，参数type表示植物的类型
        }
        // 监听网页是否退到后台
        document.onvisibilitychange = function () {
            isBack = document.visibilityState != 'visible';
        }
        window.onload = function () {
            updateSunDisplay(); // 初始化显示
            startNaturalSun();  // 【新增】启动自然阳光
            setInterval(() => {
                if (!window.isBack){
                    addSprite(); //每隔100/8毫秒调用一次addSprite函数，添加一个新的僵尸精灵
                    spriteStep(); //每隔100/8毫秒调用一次spriteStep函数，更新所有僵尸精灵的位置和状态
                    onHitting(); //每隔100/8毫秒调用一次onHitting函数，处理精灵被击中的情况
                }
                
            }, 100 / 8)
        }
            function addSprite() {  //定义一个addSprite函数，用于添加一个新的精灵
                if (zbIndex > 20) { //当zbIndex大于等于20时，直接返回，不执行后续代码
                    return
                }
                counter++; //每次调用step方法时，将counter属性加1
                if (parseInt(counter / duration) >= zbIndex) {  //当counter除以duration的整数部分大于等于zbIndex时，说明已经到了添加下一个僵尸精灵的时间
                    zombies.push(createZombie(zbIndex, ()=> {
                        alert("Game Over!"); //当僵尸精灵到达左边界时，弹出一个提示框，显示"Game Over!"，表示游戏结束
                        location.reload(); //重新加载页面，重置游戏状态
                    })); //调用createZombie函数创建一个新的僵尸精灵，并将其添加到zombies数组中
                    if (zbIndex == 2) { //如果当前是第二个僵尸精灵
                        duration = 100
                        counter = duration * zbIndex; //将counter重置为duration乘以zbIndex，以便下一个僵尸精灵的添加时间正确计算    
                    }
                    if (zbIndex == 10) { //如果当前是第十个僵尸精灵
                        duration = 2000 //将duration设置为2000，以便下一个僵尸精灵的添加时间正确计算
                        counter = duration * zbIndex; //将counter重置为duration乘以zbIndex，以便下一个僵尸精灵的添加时间正确计算    
                    }
                    if (zbIndex == 11) { //如果当前是第十一个僵尸精灵
                        duration = 100 //将duration设置为100，以便下一个僵尸精灵的添加时间正确计算
                        counter = duration * zbIndex; //将counter重置为duration乘以zbIndex，以便下一个僵尸精灵的添加时间正确计算    
                    }  //利用20个僵尸的资源，设计了一个僵尸精灵的添加时间表，使得游戏的节奏更加紧凑和有趣
                    zbIndex++; //将zbIndex加1，以便创建下一个僵尸精灵
                }


            }
            function spriteStep() {  //定义一个spriteStep函数，用于更新精灵的位置和状态
                for (var zombie of zombies) { //遍历zombies数组中的每个僵尸精灵
                    zombie.step(); //调用每个僵尸精灵的step方法，更新其位置和状态
                }
                for (var bullet of bullets) { //遍历bullets数组中的每个子弹精灵
                    bullet.step(); //调用每个子弹精灵的step方法，更新其位置和状态
                }
            }
            // 在 04-pvz.html 的 <script> 标签内，替换原有的 onHitting 函数
            function onHitting() {
                // 1. 先处理所有子弹的飞行和碰撞检测
                for (var i = bullets.length - 1; i >= 0; i--) {
                    var bullet = bullets[i];
                    if (bullet.src.endsWith("BulletHit.gif")) {
                        continue;
                    }
                    
                    if (hitZombie(bullet)) {
                        bullet.src = "images/BulletHit.gif";
                    }
                }

                // 2. 再处理僵尸吃植物的逻辑
                for (var j = zombies.length - 1; j >= 0; j--) {
                    var zombie = zombies[j];
                    
                    if (zombie.src.includes("Die") || zombie.src.includes("LostHead")) {
                        continue;
                    }

                    var plant = eatPlantBy(zombie);
                    
                    if (plant) {
                        if (zombie.blood > 0) {
                            // --- 僵尸攻击图片逻辑 ---
                            if (zombie.blood <= 10) {
                                if (!zombie.src.includes("Attack")) zombie.src = "images/ZombieAttack.gif";
                            } else if (zombie.status == 5) {
                                if (!zombie.src.includes("Attack")) zombie.src = "images/BucketheadZombieAttack.gif";
                            } else {
                                if (!zombie.src.includes("Attack")) zombie.src = "images/ConeheadZombieAttack.gif";
                            }
                            
                            if (!plant.attack.includes(zombie)) {
                                plant.attack.push(zombie);
                            }
                            
                            // 扣植物血
                            plant.blood--;
                            
                            // --- 【最终修复】坚果墙受伤变图逻辑 (基于固定血量) ---
                            if (plant.type == 7) {
                                var currentStage = plant.damageStage;
                                var newStage = 0;
                                var targetImg = "images/WallNut.gif";

                                // 根据固定血量阈值判断阶段
                                if (plant.blood < 1000) {
                                    newStage = 2;
                                    targetImg = "images/WallNut_cracked2.gif";
                                } else if (plant.blood < 2000) {
                                    newStage = 1;
                                    targetImg = "images/WallNut_cracked1.gif";
                                } else {
                                    newStage = 0;
                                    targetImg = "images/WallNut.gif";
                                }

                                // 只有当阶段发生改变时，才更新图片和状态
                                // 这避免了每帧重置 src 导致的 GIF 动画卡死
                                if (currentStage !== newStage) {
                                    plant.src = targetImg;
                                    plant.damageStage = newStage;
                                }
                            }
                            // ----------------------------------

                            // 检查植物是否死亡
                            if (plant.blood <= 0) {
                                if (plant.timer) clearInterval(plant.timer);
                                
                                var pIndex = plants.indexOf(plant);
                                if (pIndex > -1) {
                                    plants.splice(pIndex, 1);
                                }
                                container.removeChild(plant);
                                
                                for (var zz of plant.attack) {
                                    if (zz && zz.blood > 0) {
                                        if (zz.blood <= 10) {
                                            zz.src = "images/Zombie.gif";
                                        } else if (zz.status == 5) {
                                            zz.src = "images/BucketheadZombie.gif";
                                        } else if (zz.status == 3 || zz.status == 4) {
                                            zz.src = "images/ConeheadZombie.gif";
                                        }
                                        zz.style.filter = "none";
                                        zz.speed = 5; 
                                    }
                                }
                            }
                        }
                    }
                }
            }
            function eatPlantBy(zombie) {
                for (var i in plants) {
                    var plant = plants[i];
                    if (plant.offsetLeft - 40 > zombie.offsetLeft &&
                    plant.offsetLeft - 100 < zombie.offsetLeft &&
                    plant.route == zombie.route) { //判断僵尸是否在植物的范围内，并且与植物在同一行
                    plant.index = i; // 记录所在下标
                    return plant;
                    }
                }
                return null; //返回null，表示没有找到被僵尸吃掉的植物
            }

            // 在 04-pvz.html 的 <script> 标签内，替换原有的 hitZombie 函数

            function hitZombie(bullet) {
                for (var zombie of zombies) {
                    // 忽略已经死亡或正在死亡的僵尸
                    if (zombie.src.includes("Die") || zombie.src.includes("LostHead")) {
                        continue;
                    }

                    // 碰撞检测
                    if (bullet.offsetLeft - 70 > zombie.offsetLeft &&
                        bullet.offsetLeft - 140 < zombie.offsetLeft &&
                        bullet.route == zombie.route) {
                        
                        // 击中僵尸，扣血
                        zombie.blood--;
                        
                        // --- 【修改】处理掉帽子/路障逻辑 ---
                        // 如果血量降到10或以下，且原本是特殊僵尸（路障或铁桶）
                        if (zombie.blood <= 10 && zombie.status != 0 && zombie.status != 1 && zombie.status != 2) {
                            // 1. 改变状态为普通僵尸 (status 0-2 都是普通僵尸，这里统一设为0)
                            zombie.status = 0; 
                            
                            // 2. 判断当前是否正在攻击植物，以决定显示哪张普通僵尸图片
                            var isAttacking = false;
                            // 简单判断：如果图片包含 "Attack"，说明刚才正在吃东西
                            if (zombie.src.includes("Attack")) {
                                isAttacking = true;
                            }
                            
                            // 3. 切换为普通僵尸图片
                            if (isAttacking) {
                                zombie.src = "images/ZombieAttack.gif";
                            } else {
                                zombie.src = "images/Zombie.gif";
                            }
                            
                            // 【删除】此处不再清除 filter 和重置 speed，保留冰冻状态
                            // zombie.style.filter = "none"; 
                            // zombie.speed = 5; 
                        }
                        // ----------------------------------

                        // 处理冰冻豌豆效果
                        // 注意：这段代码在掉帽子逻辑之后执行。
                        // 如果子弹是冰豌豆 (type 3)，无论是否刚掉帽子，都会应用冰冻效果。
                        // 如果子弹不是冰豌豆，则不会干扰现有的冰冻状态（因为上面删除了清除逻辑）。
                        if (bullet.type == 3 && zombie.blood > 0) {
                            zombie.speed = 10; // 减速
                            zombie.style.filter = "brightness(0.6) hue-rotate(180deg) saturate(1.5)";
                        }

                        // 处理僵尸死亡
                        if (zombie.blood <= 0) {
                            var head = creatdHead(zombie);
                            
                            // 根据僵尸当前类型设置死亡前的无头图片
                            if (zombie.src.includes("Attack")) {
                                zombie.src = "images/ZombieLostHeadAttack.gif";
                            } else {
                                zombie.src = "images/ZombieLostHead.gif";
                            }
                            
                            setTimeout(() => {
                                if(zombie.parentNode) {
                                    zombie.src = "images/ZombieDie.gif";
                                    if(head.parentNode) container.removeChild(head);
                                }
                            }, 1000);
                            
                            setTimeout(() => {
                                zombieDie(zombie);
                            }, 2000);
                            
                            return true; // 击中并导致死亡
                        } 
                        else {
                            // 僵尸未死，显示受伤闪烁效果
                            zombie.style.opacity = 0.7;
                            setTimeout(() => {
                                if(zombie.parentNode) zombie.style.opacity = 1;
                            }, 100);
                        }
                        
                        return true; // 击中
                    }
                }
                return false;
            }
            function zombieDie(zombie) {
                zombies = zombies.filter(item => item != zombie); //将被击死的僵尸从zombies数组中移除
                container.removeChild(zombie); //将僵尸从container元素中移除
                zbDieNo++; //增加僵尸死亡数量
                if (zbDieNo > 20){
                    alert("You Win!"); //当僵尸死亡的数量大于20时，弹出一个提示框，显示"You Win!"，表示游戏胜利
                    location.reload(); //重新加载页面，重置游戏状态
                }
            }
            
    </script>
</body>

</html>
